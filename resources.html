<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolfox | 资料</title>
  <meta name="description" content="Wolfox 的资料页面。">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="resources">
  <div class="site-shell">
    <div data-include="nav"></div>

    <main>
      <div class="top-actions">
        <a class="button secondary" href="index.html">返回上一页</a>
      </div>

      <section class="materials-layout">
        <section class="repo-panel materials-panel">
          <div class="repo-panel-head">
            <h2>资料</h2>
          </div>
          <div id="materials-status" class="repo-status" aria-live="polite">正在读取资料目录...</div>
          <div id="materials-root" class="materials-root" aria-live="polite"></div>
        </section>

        <section class="repo-panel viewer-panel">
          <div class="repo-panel-head">
            <h2 id="viewer-title" class="viewer-title">阅读</h2>
            <button id="viewer-fullscreen" class="button secondary small" type="button">全屏</button>
          </div>
          <div id="viewer-status" class="repo-status viewer-status">点击左侧 PDF 或文件开始阅读。</div>
          <iframe id="materials-viewer" class="materials-viewer" title="资料阅读区"></iframe>
        </section>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
